name: Publish packages to npm

on:
  push:
    branches: ["master"]

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.check.outputs.changes }}
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Check for version changes
        id: check
        run: node scripts/ci/publish-check.mjs
      - name: Notify Discord
        if: steps.check.outputs.has_changes == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PUBLISH_CHANGES: ${{ steps.check.outputs.changes }}
        run: node scripts/ci/notify-discord.mjs

  publish:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
        env:
          DOT_ENV_CONTENT: ${{ secrets.examples_dot_env }}
      - name: Publish packages
        env:
          PUBLISH_CHANGES: ${{ needs.check.outputs.changes }}
        run: node scripts/ci/publish-packages.mjs
